<div class="space-y-6">
  <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
    <h2 class="text-2xl font-semibold mb-2">Gestion des sites</h2>
    <p class="text-sm text-gray-600">Ajoutez, consultez et supprimez des sites padel depuis l'administration.</p>
  </div>

  <div class="grid gap-6 lg:grid-cols-[1.6fr_1fr]">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 space-y-4">
      <h3 class="text-xl font-semibold">Créer un site</h3>
      <div class="grid gap-4">
        <label class="block text-sm font-medium text-gray-700">Nom du site</label>
        <input type="text" class="input-field" [(ngModel)]="newSiteName" placeholder="Padel Arena Lyon" />

        <label class="block text-sm font-medium text-gray-700">Localisation</label>
        <input type="text" class="input-field" [(ngModel)]="newSiteLocation" placeholder="Lyon 3e" />

        <label class="block text-sm font-medium text-gray-700">Description</label>
        <textarea class="input-field" rows="3" [(ngModel)]="newSiteDescription" placeholder="Description du site"></textarea>

        <div class="grid gap-4 sm:grid-cols-2">
          <div>
            <label class="block text-sm font-medium text-gray-700">Ouverture</label>
            <input type="time" class="input-field" [(ngModel)]="newSiteOpeningHour" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Fermeture</label>
            <input type="time" class="input-field" [(ngModel)]="newSiteClosingHour" />
          </div>
        </div>

        <button type="button" class="btn-primary" [disabled]="!canAddSite" (click)="addSite()">Ajouter le site</button>
      </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 space-y-4">
      <div class="flex items-center justify-between gap-4">
        <h3 class="text-xl font-semibold">Sites existants</h3>
      </div>

      <div *ngIf="sites().length; else noSites" class="space-y-4">
        <div *ngFor="let site of sites()" class="rounded-2xl border border-gray-100 p-4 bg-slate-50">
          <div class="flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
            <div>
              <div class="font-semibold">{{ site.name }}</div>
              <div class="text-sm text-gray-600">{{ site.location }}</div>
            </div>
            <button type="button" class="btn-danger" (click)="deleteSite(site.id)">Supprimer</button>
          </div>
          <div class="mt-3 grid gap-2 sm:grid-cols-2 text-sm text-gray-700">
            <div>Horaires : {{ site.openingHour }} - {{ site.closingHour }}</div>
            <div>Terrains : {{ site.terrains.length }}</div>
          </div>
        </div>
      </div>

      <ng-template #noSites>
        <div class="rounded-2xl border border-dashed border-gray-300 p-4 text-center text-sm text-gray-600">Aucun site enregistré pour le moment.</div>
      </ng-template>
    </div>
  </div>
</div>
