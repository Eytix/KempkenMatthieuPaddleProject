<div class="space-y-6">
  <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
    <h2 class="text-2xl font-semibold mb-2">Gestion des terrains</h2>
    <p class="text-sm text-gray-600">Ajoutez, consultez et supprimez des terrains par site padel.</p>
  </div>

  <div class="grid gap-6 lg:grid-cols-[1.6fr_1fr]">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 space-y-4">
      <h3 class="text-xl font-semibold">Créer un terrain</h3>
      <div class="grid gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700">Site</label>
          <select class="mt-1 block w-full rounded-xl border-gray-300 bg-white px-4 py-3 shadow-sm focus:border-indigo-500 focus:ring-indigo-500" [(ngModel)]="selectedSiteForTerrain">
            <option value="">Sélectionner un site</option>
            <option *ngFor="let site of sites()" [value]="site.id">{{ site.name }} - {{ site.location }}</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700">Nom du terrain</label>
          <input type="text" class="mt-1 block w-full rounded-xl border-gray-300 bg-white px-4 py-3 shadow-sm focus:border-indigo-500 focus:ring-indigo-500" [(ngModel)]="newTerrainName" placeholder="Terrain 1, Terrain 2..." />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700">Description</label>
          <textarea class="mt-1 block w-full rounded-xl border-gray-300 bg-white px-4 py-3 shadow-sm focus:border-indigo-500 focus:ring-indigo-500" rows="3" [(ngModel)]="newTerrainDescription" placeholder="Description du terrain"></textarea>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700">Prix par heure (€)</label>
          <input type="number" class="mt-1 block w-full rounded-xl border-gray-300 bg-white px-4 py-3 shadow-sm focus:border-indigo-500 focus:ring-indigo-500" [(ngModel)]="newTerrainPrice" placeholder="60" />
        </div>

        <button type="button" class="rounded-xl bg-indigo-600 px-5 py-3 text-white shadow-sm hover:bg-indigo-700 disabled:opacity-50" [disabled]="!canAddTerrain" (click)="addTerrain()">Ajouter le terrain</button>
      </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 space-y-4">
      <div class="flex items-center justify-between gap-4">
        <h3 class="text-xl font-semibold">Terrains existants</h3>
        <div class="flex gap-2">
          <button type="button" class="rounded-lg border px-3 py-2 text-sm font-medium" [class.border-indigo-600]="sortBy() === 'site'" [class.bg-indigo-50]="sortBy() === 'site'" (click)="setSortBy('site')">
            Site
          </button>
          <button type="button" class="rounded-lg border px-3 py-2 text-sm font-medium" [class.border-indigo-600]="sortBy() === 'price'" [class.bg-indigo-50]="sortBy() === 'price'" (click)="setSortBy('price')">
            Prix
          </button>
        </div>
      </div>

      <div *ngIf="sortedTerrains().length; else noTerrains" class="space-y-3 max-h-96 overflow-y-auto">
        <div *ngFor="let terrain of sortedTerrains()" class="rounded-xl border border-gray-100 overflow-hidden">
          <button type="button" class="w-full text-left p-3 bg-gray-50 hover:bg-gray-100 flex items-center justify-between text-sm" (click)="toggleTerrainExpanded(terrain.id)">
            <div>
              <div class="font-semibold">{{ terrain.name }}</div>
              <div class="text-xs text-gray-600">{{ getSiteName(terrain.siteId) }}</div>
            </div>
            <div class="flex items-center gap-2">
              <span class="text-indigo-600 font-semibold">{{ terrain.pricePerHour }}€</span>
              <span class="text-lg text-indigo-600" [class.rotate-180]="isTerrainExpanded(terrain.id)">⌄</span>
            </div>
          </button>

          <div *ngIf="isTerrainExpanded(terrain.id)" class="p-3 bg-white border-t border-gray-100 text-sm space-y-2">
            <div class="text-gray-700">{{ terrain.description }}</div>
            <div class="flex justify-end gap-2 pt-2 border-t border-gray-100 mt-2">
              <button type="button" class="rounded-lg border border-red-300 px-4 py-2 text-xs text-red-700 hover:bg-red-50" (click)="deleteTerrain(terrain.id)">Supprimer</button>
            </div>
          </div>
        </div>
      </div>

      <ng-template #noTerrains>
        <div class="rounded-xl border border-dashed border-gray-300 p-4 text-center text-sm text-gray-600">Aucun terrain enregistré pour le moment.</div>
      </ng-template>
    </div>
  </div>
</div>
